name: health_messenger_ui
description: Messenger-like reusable chat UI package for Flutter.
version: 0.1.0
homepage: https://example.com

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  audioplayers: ^6.5.1
  http: ^1.2.2
  dio: ^5.9.0
  socket_io_client: ^3.1.2
  file_picker: ^10.3.2
  image_picker: ^1.2.0
  record: ^6.2.0
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  plugin:
    platforms:
      android:
        package: com.example.health_messenger_ui
        pluginClass: HealthMessengerUiPlugin
      ios:
        pluginClass: HealthMessengerUiPlugin
